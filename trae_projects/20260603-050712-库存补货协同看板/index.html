<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>库存补货协同看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef6ff',100:'#d9eaff',200:'#bcdbff',300:'#8ec5ff',400:'#59a5ff',500:'#3b82fc',600:'#1b65f5',700:'#1a4edb',800:'#1c3db2',900:'#1b3a8a' },
            surface: { 800:'#1e293b',900:'#0f172a',950:'#020617' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface-950 text-gray-100 min-h-screen font-sans antialiased">

  <!-- 顶部导航 -->
  <header class="sticky top-0 z-50 bg-surface-900/90 backdrop-blur border-b border-white/10">
    <div class="max-w-[1920px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-wide">库存补货协同看板</h1>
          <p class="text-xs text-gray-400">Inventory Replenishment Collaborative Dashboard</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="alertBadge" class="relative cursor-pointer group" onclick="App.toggleAlertPanel()">
          <svg class="w-6 h-6 text-amber-400 group-hover:text-amber-300 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-5-5.917V4a1 1 0 10-2 0v1.083A6 6 0 006 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0a3 3 0 11-6 0m6 0H9"/></svg>
          <span id="alertCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </div>
        <div class="text-right">
          <div id="currentTime" class="text-sm font-mono text-brand-400"></div>
          <div class="text-[10px] text-gray-500">实时同步</div>
        </div>
      </div>
    </div>
  </header>

  <!-- 预警面板 -->
  <div id="alertPanel" class="hidden fixed top-[60px] right-4 z-50 w-96 max-h-[70vh] bg-surface-800 border border-white/10 rounded-xl shadow-2xl overflow-hidden">
    <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between">
      <h3 class="font-semibold text-amber-400">⚠ 实时预警</h3>
      <button onclick="App.clearAlerts()" class="text-xs text-gray-400 hover:text-white transition">全部已读</button>
    </div>
    <div id="alertList" class="overflow-y-auto max-h-[60vh] p-3 space-y-2"></div>
  </div>

  <!-- KPI 概览条 -->
  <div class="max-w-[1920px] mx-auto px-4 sm:px-6 mt-4">
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3" id="kpiBar"></div>
  </div>

  <!-- 主内容 -->
  <main class="max-w-[1920px] mx-auto px-4 sm:px-6 py-4 space-y-4">

    <!-- 第一行：仓库列表 + SKU 风险 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- 仓库列表 -->
      <section class="lg:col-span-1 bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2">
            <span class="w-1.5 h-5 bg-brand-500 rounded-full"></span>仓库列表
          </h2>
          <select id="warehouseFilter" class="text-xs bg-surface-900 border border-white/10 rounded px-2 py-1 text-gray-300 focus:outline-none focus:border-brand-500" onchange="App.filterWarehouse(this.value)">
            <option value="all">全部仓库</option>
          </select>
        </div>
        <div id="warehouseList" class="space-y-2 max-h-[420px] overflow-y-auto pr-1"></div>
      </section>

      <!-- SKU 风险 -->
      <section class="lg:col-span-2 bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2">
            <span class="w-1.5 h-5 bg-red-500 rounded-full"></span>SKU 风险矩阵
          </h2>
          <div class="flex gap-2 text-[10px]">
            <span class="px-2 py-0.5 rounded bg-red-500/20 text-red-400">高风险</span>
            <span class="px-2 py-0.5 rounded bg-amber-500/20 text-amber-400">中风险</span>
            <span class="px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-400">低风险</span>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div id="skuRiskTable" class="overflow-y-auto max-h-[380px]"></div>
          <div class="flex items-center justify-center">
            <canvas id="skuRiskChart" class="max-h-[340px]"></canvas>
          </div>
        </div>
      </section>
    </div>

    <!-- 第二行：补货建议 + 供应商协同 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <!-- 补货建议 -->
      <section class="bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2">
            <span class="w-1.5 h-5 bg-emerald-500 rounded-full"></span>补货建议
          </h2>
          <div class="flex gap-2">
            <button onclick="App.sortReplenish('urgency')" class="text-[10px] px-2 py-1 bg-brand-600/30 text-brand-300 rounded hover:bg-brand-600/50 transition">按紧急度</button>
            <button onclick="App.sortReplenish('quantity')" class="text-[10px] px-2 py-1 bg-surface-900 text-gray-400 rounded hover:bg-surface-700 transition">按数量</button>
          </div>
        </div>
        <div id="replenishList" class="space-y-2 max-h-[400px] overflow-y-auto pr-1"></div>
      </section>

      <!-- 供应商协同 -->
      <section class="bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2">
            <span class="w-1.5 h-5 bg-violet-500 rounded-full"></span>供应商协同
          </h2>
          <button onclick="App.refreshSuppliers()" class="text-[10px] px-2 py-1 bg-violet-600/30 text-violet-300 rounded hover:bg-violet-600/50 transition">刷新状态</button>
        </div>
        <div id="supplierList" class="space-y-2 max-h-[400px] overflow-y-auto pr-1"></div>
      </section>
    </div>

    <!-- 第三行：趋势概览 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- 库存趋势 -->
      <section class="lg:col-span-2 bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2">
            <span class="w-1.5 h-5 bg-cyan-500 rounded-full"></span>趋势概览
          </h2>
          <div class="flex gap-1">
            <button onclick="App.setTrendRange('7d')" class="trend-btn text-[10px] px-2 py-1 rounded bg-brand-600/40 text-brand-200" data-range="7d">7天</button>
            <button onclick="App.setTrendRange('30d')" class="trend-btn text-[10px] px-2 py-1 rounded bg-surface-900 text-gray-400" data-range="30d">30天</button>
            <button onclick="App.setTrendRange('90d')" class="trend-btn text-[10px] px-2 py-1 rounded bg-surface-900 text-gray-400" data-range="90d">90天</button>
          </div>
        </div>
        <canvas id="trendChart" class="w-full" style="max-height:300px"></canvas>
      </section>

      <!-- 仓库库存对比 -->
      <section class="bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2 mb-4">
          <span class="w-1.5 h-5 bg-amber-500 rounded-full"></span>仓库库存对比
        </h2>
        <canvas id="warehouseCompareChart" style="max-height:280px"></canvas>
      </section>
    </div>

    <!-- 第四行：补货到货时间线 + SKU 类别分布 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <section class="bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2 mb-4">
          <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span>补货到货时间线
        </h2>
        <canvas id="replenishTimelineChart" style="max-height:280px"></canvas>
      </section>
      <section class="bg-surface-800/80 rounded-xl border border-white/5 p-4">
        <h2 class="text-sm font-bold text-gray-200 flex items-center gap-2 mb-4">
          <span class="w-1.5 h-5 bg-pink-500 rounded-full"></span>SKU 类别分布
        </h2>
        <canvas id="categoryChart" style="max-height:280px"></canvas>
      </section>
    </div>

  </main>

  <!-- 补货详情模态框 -->
  <div id="replenishModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-surface-800 border border-white/10 rounded-xl w-full max-w-lg mx-4 p-6 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg" id="modalTitle">补货详情</h3>
        <button onclick="App.closeModal()" class="text-gray-400 hover:text-white text-xl">&times;</button>
      </div>
      <div id="modalBody" class="space-y-3 text-sm"></div>
      <div class="mt-5 flex justify-end gap-3">
        <button onclick="App.closeModal()" class="px-4 py-2 text-sm rounded-lg bg-surface-900 text-gray-300 hover:bg-surface-700 transition">取消</button>
        <button onclick="App.approveReplenish()" class="px-4 py-2 text-sm rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition">确认补货</button>
      </div>
    </div>
  </div>

  <footer class="text-center text-[10px] text-gray-600 py-4">库存补货协同看板 &copy; 2026 &mdash; 数据为本地模拟</footer>

  <script src="js/mock-data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
